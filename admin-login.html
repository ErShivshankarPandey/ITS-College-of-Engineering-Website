<body>

<header>
  <div class="logo"><h2>ITS COLLEGE OF ENGINEERING</h2></div>

    <a href="about.html">About</a>

<section class="form-section">
  <div class="form-card">
    <h2>Admin Login</h2>
    <p class="form-sub">Restricted access for college staff and administrators only.</p>
    <p class="form-message"></p>

    <form data-demo-form data-success="Login successful. Redirecting to the admin panel.">
      <div class="field">
        <label for="admin-id">Admin ID</label>
        <input type="text" id="admin-id" name="admin-id" required>
      </div>
      <div class="field">
        <label for="admin-password">Password</label>
        <input type="password" id="admin-password" name="admin-password" required>
      </div>
      <button type="submit" class="btn-submit">Log In</button>
    </form>

    <p class="form-foot">Looking for the student portal? <a href="login.html">Student Login</a></p>
  </div>
</section>
